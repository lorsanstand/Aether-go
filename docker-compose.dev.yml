services:
  postgres-db:
    image: postgres:latest
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
    networks:
      - aether-dev
    ports:
    - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      retries: 5
    restart: always

  redis:
    image: redis:latest
    volumes:
      - redis_data:/data
    networks:
      - aether-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: always

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    networks:
      - aether-dev
    depends_on:
      - redis

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "${SMTP_PORT}:1025"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.8-management
    ports:
      - "${RMQ_PORT}:5672"
      - "15672:15672"
    networks:
      - aether-dev
    environment:
      RABBITMQ_DEFAULT_USER: "${RMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RMQ_PASS}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  rabbitmq-data:
  esdata:

networks:
  aether-dev: